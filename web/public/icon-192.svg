<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AFA9EC"/>
      <stop offset="50%" stop-color="#9FE1CB"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect x="0" y="0" width="192" height="192" rx="43" fill="#121210"/>

  <!-- Sound wave bars -->
  <g transform="translate(28, 45)">
    <rect x="0"   y="20" width="6" height="26" rx="3" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="13"  y="10" width="6" height="46" rx="3" fill="url(#waveGrad)" opacity="0.70"/>
    <rect x="26"  y="0"  width="6" height="66" rx="3" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="39" y="6" width="6" height="54" rx="3" fill="url(#waveGrad)" opacity="0.80"/>
    <rect x="52" y="16" width="6" height="34" rx="3" fill="url(#waveGrad)" opacity="0.60"/>
  </g>

  <!-- Arrow -->
  <path d="M94 96 L102 96" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M99 93 L104 96 L99 99" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>

  <!-- Text lines -->
  <g transform="translate(109, 52)">
    <rect x="0" y="0"   width="49" height="4" rx="2" fill="#EEEDFE" opacity="0.85"/>
    <rect x="0" y="13"  width="37" height="4" rx="2" fill="#CECBF6" opacity="0.65"/>
    <rect x="0" y="26"  width="44" height="4" rx="2" fill="#CECBF6" opacity="0.55"/>
    <rect x="0" y="39" width="28" height="4" rx="2" fill="#AFA9EC" opacity="0.45"/>
    <rect x="0" y="52" width="49" height="4" rx="2" fill="#CECBF6" opacity="0.60"/>
    <rect x="0" y="65" width="34" height="4" rx="2" fill="#AFA9EC" opacity="0.40"/>
  </g>
