    <rect x="34"  y="26" width="15" height="120" rx="7" fill="url(#waveGrad)" opacity="0.70"/>
    <rect x="68"  y="0"  width="15" height="172" rx="7" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="102" y="17" width="15" height="138" rx="7" fill="url(#waveGrad)" opacity="0.80"/>
    <rect x="136" y="43" width="15" height="86" rx="7" fill="url(#waveGrad)" opacity="0.60"/>
