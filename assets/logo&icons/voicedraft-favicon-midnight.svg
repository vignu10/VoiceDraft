<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AFA9EC"/>
      <stop offset="50%" stop-color="#9FE1CB"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="#121210"/>

  <!-- Simplified: just the wave bars, centered and larger for small sizes -->
  <g transform="translate(100, 120)">
    <rect x="0"   y="56"  width="20" height="72"  rx="10" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="44"  y="28"  width="20" height="128" rx="10" fill="url(#waveGrad)" opacity="0.70"/>
    <rect x="88"  y="0"   width="20" height="184" rx="10" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="132" y="18"  width="20" height="148" rx="10" fill="url(#waveGrad)" opacity="0.80"/>
    <rect x="176" y="46"  width="20" height="92"  rx="10" fill="url(#waveGrad)" opacity="0.60"/>
  </g>

  <!-- Simplified text lines for small render -->
  <g transform="translate(278, 152)">
    <rect x="0" y="0"   width="120" height="12" rx="6" fill="#EEEDFE" opacity="0.80"/>
    <rect x="0" y="36"  width="90"  height="12" rx="6" fill="#CECBF6" opacity="0.60"/>
    <rect x="0" y="72"  width="108" height="12" rx="6" fill="#CECBF6" opacity="0.50"/>
    <rect x="0" y="108" width="66"  height="12" rx="6" fill="#AFA9EC" opacity="0.40"/>
    <rect x="0" y="144" width="120" height="12" rx="6" fill="#CECBF6" opacity="0.55"/>
  </g>
</svg>
